name: Deploy
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted   # or a custom label you assigned the runner
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests
        shell: powershell
        run: |
          & "C:\homeAC-master-controller-main\.venv\Scripts\python.exe" -m unittest discover -s tests -t . -v

      - name: Stop service
        run: nssm stop ACmaster   # your actual NSSM service name

      - name: Sync code (preserve the venv!)
        shell: powershell
        run: |
          robocopy . C:\homeAC-master-controller-main /MIR /XD .venv .git __pycache__
          if ($LASTEXITCODE -lt 8) { exit 0 } else { exit $LASTEXITCODE }

      - name: Install requirements
        shell: powershell
        run: |
          & "C:\homeAC-master-controller-main\.venv\Scripts\python.exe" -m pip install -r "C:\homeAC-master-controller-main\requirements.txt"

      - name: Start service
        run: nssm start ACmaster

      - name: Service status
        shell: powershell
        run: |
          Start-Sleep -Seconds 5
          $status = ((nssm status ACmaster | Out-String) -replace "[^A-Z_]", "")
          Write-Host "Service status: $status"
          if ($status -ne "SERVICE_RUNNING") {
            Write-Error "ACmaster is not running (status: $status)"
            exit 1
          }