<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AC Master Controller</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 1rem; max-width: 960px; margin: 0 auto; }
    h1 { font-size: 1.3rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
    .card { border: 1px solid #8884; border-radius: 8px; padding: 1rem; }
    .card h2 { margin: 0 0 .5rem; font-size: 1rem; }
    .big { font-size: 2rem; font-weight: 600; }
    .pill { display: inline-block; padding: .1rem .5rem; border-radius: 999px; font-size: .8rem; }
    .ok { background: #2e7d3233; color: #2e7d32; }
    .bad { background: #c6282833; color: #c62828; }
    label { display: block; margin: .4rem 0 .1rem; font-size: .85rem; }
    input, select, button { font: inherit; padding: .3rem .5rem; }
    button { cursor: pointer; border-radius: 6px; border: 1px solid #8886; }
    .row { display: flex; gap: .5rem; flex-wrap: wrap; align-items: end; }
    .reason { font-size: .85rem; opacity: .8; }
    canvas { max-height: 320px; }
  </style>
</head>
<body>
  <h1>AC Master Controller</h1>

  <div class="grid">
    <div class="card">
      <h2>Room temperature</h2>
      <div class="big" id="temp">–</div>
      <div class="reason" id="humco2"></div>
    </div>
    <div class="card">
      <h2>AC</h2>
      <div class="big" id="acpower">–</div>
      <div class="reason" id="acdetail"></div>
    </div>
    <div class="card">
      <h2>Devices</h2>
      <div>Aranet ESP32: <span id="aranet_lwt" class="pill">?</span></div>
      <div>Sensor: <span id="aranet_avail" class="pill">?</span></div>
      <div>AC ESP32: <span id="ac_lwt" class="pill">?</span></div>
      <div class="reason" id="sensorage"></div>
    </div>
    <div class="card">
      <h2>Controller</h2>
      <div class="reason" id="reason">–</div>
      <div class="reason" id="lastcmd"></div>
    </div>
  </div>

  <div class="card" style="margin-top:1rem">
    <h2>Control settings</h2>
    <form id="cfgform" class="row">
      <div><label>Auto control</label>
        <select name="enabled"><option value="true">Enabled</option><option value="false">Disabled</option></select></div>
      <div><label>Mode</label>
        <select name="mode"><option>cool</option><option>heat</option><option>dry</option><option>fan</option><option>auto</option></select></div>
      <div><label>Fan</label>
        <select name="fan"><option>auto</option><option>min</option><option>low</option><option>med</option><option>high</option><option>max</option></select></div>
      <div><label>Setpoint °C</label><input name="setpoint_c" type="number" step="0.5" style="width:5rem"></div>
      <div><label>Deadband ±°C</label><input name="deadband_c" type="number" step="0.1" style="width:5rem"></div>
      <div><label>AC temp °C</label><input name="ac_temp" type="number" step="1" style="width:5rem"></div>
      <div><button type="submit">Save</button></div>
    </form>
  </div>

  <div class="card" style="margin-top:1rem">
    <h2>Manual AC control</h2>
    <p class="reason">Disable auto control above for sustained manual use, otherwise the loop may override these.</p>
    <div class="row">
      <button onclick="acCmd({power:true})">Power ON</button>
      <button onclick="acCmd({power:false})">Power OFF</button>
      <button onclick="forceRead()">Force sensor read</button>
    </div>
  </div>

  <div class="card" style="margin-top:1rem">
    <h2>History
      <select id="histrange" onchange="loadHistory()">
        <option value="6">6 h</option><option value="24" selected>24 h</option>
        <option value="72">3 d</option><option value="168">7 d</option>
      </select>
    </h2>
    <canvas id="chart"></canvas>
  </div>

<script>
function pill(el, val) {
  el.textContent = val ?? "?";
  el.className = "pill " + (val === "online" ? "ok" : val === "offline" ? "bad" : "");
}

async function refresh() {
  const r = await fetch("/api/status"); const d = await r.json();
  const s = d.state, c = d.control;
  const temp = s.sensor && s.sensor.temperature;
  document.getElementById("temp").textContent = temp != null ? temp.toFixed(1) + " °C" : "–";
  document.getElementById("humco2").textContent = s.sensor
    ? `${s.sensor.humidity ?? "?"}% RH · ${s.sensor.co2 ?? "?"} ppm CO₂` : "no reading yet";
  document.getElementById("acpower").textContent = s.ac ? (s.ac.power ? "ON" : "OFF") : "–";
  document.getElementById("acdetail").textContent = s.ac
    ? `${s.ac.mode ?? ""} · ${s.ac.temp ?? ""}°C · fan ${s.ac.fan ?? ""}` : "no status yet";
  pill(document.getElementById("aranet_lwt"), s.aranet_lwt);
  pill(document.getElementById("aranet_avail"), s.aranet_avail);
  pill(document.getElementById("ac_lwt"), s.ac_lwt);
  document.getElementById("sensorage").textContent =
    s.sensor_age_s != null ? `last reading ${Math.round(s.sensor_age_s)} s ago` : "";
  document.getElementById("reason").textContent = s.control_reason;
  document.getElementById("lastcmd").textContent =
    s.last_command ? "last command: " + JSON.stringify(s.last_command) : "";
}

async function loadConfig() {
  const c = (await (await fetch("/api/config")).json()).control;
  const f = document.getElementById("cfgform");
  f.enabled.value = String(c.enabled);
  f.mode.value = c.mode; f.fan.value = c.fan;
  f.setpoint_c.value = c.setpoint_c; f.deadband_c.value = c.deadband_c; f.ac_temp.value = c.ac_temp;
}

document.getElementById("cfgform").addEventListener("submit", async (e) => {
  e.preventDefault();
  const f = e.target;
  await fetch("/api/config", { method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      enabled: f.enabled.value === "true", mode: f.mode.value, fan: f.fan.value,
      setpoint_c: parseFloat(f.setpoint_c.value), deadband_c: parseFloat(f.deadband_c.value),
      ac_temp: parseInt(f.ac_temp.value) }) });
  refresh();
});

async function acCmd(cmd) {
  await fetch("/api/ac/command", { method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify(cmd) });
  setTimeout(refresh, 300);
}
async function forceRead() { await fetch("/api/sensor/read", { method: "POST" }); }

let chart;
async function loadHistory() {
  const hours = document.getElementById("histrange").value;
  const rows = await (await fetch("/api/history?hours=" + hours)).json();
  const labels = rows.map(r => new Date(r.ts * 1000).toLocaleString());
  const data = {
    labels,
    datasets: [
      { label: "Temp °C", data: rows.map(r => r.temperature), yAxisID: "y", tension: .2 },
      { label: "Setpoint °C", data: rows.map(r => r.setpoint), yAxisID: "y", borderDash: [5,5], pointRadius: 0 },
      { label: "AC on", data: rows.map(r => r.ac_power), yAxisID: "y2", stepped: true, pointRadius: 0 },
    ],
  };
  const opts = { responsive: true, interaction: { mode: "index", intersect: false },
    scales: { y: { position: "left" }, y2: { position: "right", min: 0, max: 1, ticks: { stepSize: 1 } } } };
  if (chart) { chart.data = data; chart.update(); }
  else chart = new Chart(document.getElementById("chart"), { type: "line", data, options: opts });
}

loadConfig(); refresh(); loadHistory();
setInterval(refresh, 5000);
setInterval(loadHistory, 60000);
</script>
</body>
</html>
